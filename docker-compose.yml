services:
  redis:
    image: redis:alpine
    container_name: repo-brain-redis

    ports:
      - "6379:6379"

    volumes:
      - redis-data:/data
    
    command: ["redis-server", "--appendonly", "yes"]

    restart: unless-stopped

    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    container_name: repo_mind_worker
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  redis-data:
